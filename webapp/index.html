<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portacount 8030 fit test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Portacount fit test</h1>

    <section id="connection-pill" class="conn-pill disconnected">
      <div class="conn-row">
        <div class="conn-status">
          <span class="conn-dot"></span>
          <span class="conn-title">Connection</span>
          <span class="conn-summary" id="conn-summary">Not connected</span>
        </div>
        <div class="conn-actions">
          <div class="device-picker" role="radiogroup" aria-label="Device">
            <button type="button" class="device-opt active" data-device="8030-usb" role="radio" aria-checked="true">8030</button>
            <button type="button" class="device-opt" data-device="8020-serial" role="radio" aria-checked="false">8020</button>
            <button type="button" class="device-opt" data-device="8020-sim" role="radio" aria-checked="false">Simulator</button>
          </div>
          <button id="connect-btn">Connect</button>
          <button id="disconnect-btn" disabled>Disconnect</button>
        </div>
      </div>
      <details class="conn-details" id="conn-details">
        <summary>Details</summary>
        <div class="conn-detail-grid">
          <div class="conn-detail-col">
            <h3>Stack</h3>
            <div id="usb-status" class="status-item pending"><span class="label">USB / RNDIS</span><span class="value">Idle</span></div>
            <div id="dhcp-status" class="status-item pending"><span class="label">DHCP</span><span class="value">Idle</span></div>
            <div id="runtime-status" class="status-item pending"><span class="label">Runtime (3602)</span><span class="value">Idle</span></div>
            <div id="handshake-status" class="status-item pending"><span class="label">Handshake (3603)</span><span class="value">Idle</span></div>
          </div>
          <div class="conn-detail-col">
            <h3>Device</h3>
            <div class="status-item"><span class="label">Serial</span><span class="value" id="sn-val">—</span></div>
            <div class="status-item"><span class="label">Model</span><span class="value" id="model-val">—</span></div>
            <div class="status-item"><span class="label">Build</span><span class="value" id="build-val">—</span></div>
          </div>
        </div>
      </details>
    </section>

    <div class="cols">
      <div class="left-col">
        <div class="tabs" role="tablist">
          <button class="tab active" role="tab" data-tab="testruns" aria-selected="true">Test Runs</button>
          <button class="tab" role="tab" data-tab="sampling" aria-selected="false">Sampling</button>
        </div>

        <section class="tab-panel" data-tab-panel="sampling" hidden>
          <div id="sampling-controls" class="sampling-controls">
            <div class="sampling-actions">
              <button id="start-btn" disabled>Start sampling</button>
              <button id="stop-btn" disabled>Stop sampling</button>
            </div>
            <div class="sampling-readings">
              <div class="status-item"><span class="label">Status</span><span class="value" id="rt-status">—</span></div>
              <div class="status-item"><span class="label">Ambient</span><span class="value" id="rt-amb">—</span></div>
              <div class="status-item"><span class="label">Mask</span><span class="value" id="rt-mask">—</span></div>
              <div class="status-item"><span class="label">Fit factor</span><span class="value" id="rt-ff">—</span></div>
              <div class="status-item"><span class="label">Message</span><span class="value" id="rt-msg">—</span></div>
              <div class="status-item"><span class="label">Low alcohol</span><span class="value" id="rt-low">—</span></div>
            </div>
          </div>
          <h2>Sessions</h2>
          <div id="session-list"></div>
        </section>

        <section class="tab-panel active" data-tab-panel="testruns">
          <div id="fittest-form" class="fittest-form">
            <div class="row primary">
              <label for="ft-name">Name</label>
              <input id="ft-name" type="text" placeholder="John Doe">
            </div>
            <div class="row primary">
              <label for="ft-mask-model">Mask</label>
              <input id="ft-mask-model" type="text" placeholder="3M 8511">
            </div>
            <div class="row primary protocol-row">
              <label for="ft-protocol">Protocol</label>
              <select id="ft-protocol"></select>
              <label class="checkbox-row n95-inline" title="Device-side measurement adjustment for N95 material. Honored by 8038 / 8030+N95-Companion; metadata-only on 8020.">
                <input id="ft-mask-n95" type="checkbox"> N95 mode
              </label>
            </div>
            <details id="fittest-settings" class="fittest-settings">
              <summary>
                <span class="ft-summary-label">More settings</span>
                <span class="ft-chevron" aria-hidden="true"></span>
              </summary>
              <div class="ft-more-grid">
                <div class="row">
                  <label for="ft-idnumber">ID number</label>
                  <input id="ft-idnumber" type="text" placeholder="optional">
                </div>
                <div class="row">
                  <label for="ft-mask-type">Mask type</label>
                  <select id="ft-mask-type">
                    <option value="half" selected>Half-mask APR (pass 100)</option>
                    <option value="full">Full-face APR (pass 500)</option>
                    <option value="papr-tight">Tight-fit PAPR / hood / SCBA (pass 500)</option>
                    <option value="papr-loose">Loose-fit PAPR (pass 25)</option>
                    <option value="custom">Custom</option>
                  </select>
                </div>
                <div class="row two-col">
                  <div><label for="ft-mask-size">Mask size</label><input id="ft-mask-size" type="text" placeholder="M" value="M"></div>
                  <div><label for="ft-mask-passlevel">Pass level</label><input id="ft-mask-passlevel" type="number" value="100" min="1" max="64000"></div>
                </div>
                <div class="row">
                  <label for="ft-operator">Operator</label>
                  <input id="ft-operator" type="text" value="webapp">
                </div>
                <div class="row">
                  <label for="ft-notes">Notes</label>
                  <textarea id="ft-notes" rows="2" placeholder="optional"></textarea>
                </div>
                <div class="row">
                  <label class="checkbox-row"><input id="ft-end-on-unachievable" type="checkbox"> Abort if overall FF becomes unachievable</label>
                </div>
              </div>
            </details>
          </div>
          <div class="testrun-actions">
            <button id="ft-start-btn" disabled>Start fit test</button>
            <button id="ft-abort-btn" disabled>Abort</button>
          </div>
          <div id="fittest-panel-host"></div>
          <h2>Tests</h2>
          <div id="fittest-list"></div>
        </section>

      </div>

      <aside class="right-col debug-gutter">
        <details id="debug-gutter-details" open>
          <summary>Event log</summary>
          <div class="debug-tools">
            <label class="checkbox-row">
              <input type="checkbox" id="xml-trace-toggle"> Log XML traffic
            </label>
            <label class="checkbox-row">
              <input type="checkbox" id="ft-debug-capture"> Capture debug log
            </label>
          </div>
          <div id="event-log"></div>
        </details>
      </aside>
    </div>
  </main>
  <div class="git-sha" title="Build revision">%GIT_SHA%</div>
  <script type="module" src="main.ts"></script>
</body>
</html>
